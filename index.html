<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vin Carte — 프랑스 와인 지도</title>
<!-- Leaflet 지도 엔진 (오픈소스, 무료) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #16121a;
    --panel: #211b28;
    --panel2: #2a2233;
    --line: #3a3145;
    --text: #efe9f2;
    --muted: #a89bb5;
    --wine: #b0356b;
    --wine-soft: #d1789f;
    --gold: #d9b96a;
    --red: #c96a6a;
    --white-w: #e3d48a;
    --sparkling: #9fc7d9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  header h1 span { color: var(--wine-soft); }
  .search-wrap { flex: 1; min-width: 260px; max-width: 520px; position: relative; }
  .search-wrap input {
    width: 100%; padding: 10px 14px 10px 38px;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
    color: var(--text); font-size: 14px; outline: none;
  }
  .search-wrap input:focus { border-color: var(--wine-soft); }
  .search-wrap::before {
    content: "🔍"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 13px; opacity: 0.7;
  }
  .tabs { display: flex; gap: 8px; }
  .tabs button {
    padding: 9px 18px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--panel); color: var(--muted); font-size: 14px; cursor: pointer;
    font-weight: 600;
  }
  .tabs button.active { background: var(--wine); border-color: var(--wine); color: #fff; }

  main { display: grid; grid-template-columns: minmax(340px, 1fr) minmax(320px, 480px); }
  @media (max-width: 860px) { main { grid-template-columns: 1fr; } }

  .map-area { display: flex; flex-direction: column; }
  .map-title { font-size: 14px; color: var(--muted); padding: 10px 16px; }
  #map {
    flex: 1; min-height: 520px; height: calc(100vh - 130px);
    border-top: 1px solid var(--line);
  }
  @media (max-width: 860px) { #map { height: 60vh; min-height: 380px; } }

  /* Leaflet 요소를 다크 테마에 맞게 손질 */
  .leaflet-container { background: #1d2530; font: inherit; }
  .region-tooltip {
    background: rgba(22, 18, 26, 0.92); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    font-weight: 700; font-size: 12px; padding: 4px 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .region-tooltip::before { display: none; }

  .side {
    border-left: 1px solid var(--line); background: var(--panel);
    padding: 20px; min-height: calc(100vh - 70px); overflow-y: auto;
  }
  @media (max-width: 860px) { .side { border-left: none; border-top: 1px solid var(--line); min-height: auto; } }
  .side h2 { font-size: 18px; margin-bottom: 4px; }
  .side .desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
  .badge-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .badge {
    font-size: 11px; padding: 3px 10px; border-radius: 999px;
    background: var(--panel2); border: 1px solid var(--line); color: var(--muted);
  }
  .count-note { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

  .wine-card {
    background: var(--panel2); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px; cursor: default;
    transition: border-color .15s;
  }
  .wine-card:hover { border-color: var(--wine-soft); }
  .wine-card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .wine-card .name { font-size: 14px; font-weight: 700; }
  .wine-card .vintage { font-size: 12px; color: var(--gold); white-space: nowrap; }
  .wine-card .producer { font-size: 12px; color: var(--wine-soft); margin-top: 2px; }
  .wine-card .meta { font-size: 12px; color: var(--muted); margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
  .type-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .t-red .type-dot { background: var(--red); }
  .t-white .type-dot { background: var(--white-w); }
  .t-sparkling .type-dot { background: var(--sparkling); }
  .empty { color: var(--muted); font-size: 13px; padding: 24px 0; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>Vin <span>Carte</span></h1>
  <div class="tabs">
    <button id="tab-bourgogne" class="active">부르고뉴</button>
    <button id="tab-champagne">샹파뉴</button>
  </div>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="와인, 생산자, 품종, 아펠라시옹 검색… (전체 와인 대상)">
  </div>
</header>

  { name: "볼랭저 스페셜 퀴베", producer: "볼랭저 (Bollinger)", region: "vallee-de-la-marne", appellation: "Champagne", grape: "블렌드", type: "sparkling", vintage: "NV", price: "13만원대" },
  { name: "라 클로즈리 레 베귄", producer: "제롬 프레보", region: "vallee-de-la-marne", appellation: "Champagne", grape: "피노 뫼니에", type: "sparkling", vintage: "NV", price: "40만원대" },
  { name: "트리부 뫼니에", producer: "트리부 (Tribaut)", region: "vallee-de-la-marne", appellation: "Champagne", grape: "피노 뫼니에", type: "sparkling", vintage: "NV", price: "7만원대" },
  // 코트 데 블랑
  { name: "살롱 르 메닐 블랑 드 블랑", producer: "살롱 (Salon)", region: "cote-des-blancs", appellation: "Champagne Grand Cru", grape: "샤르도네", type: "sparkling", vintage: 2012, price: "150만원대" },
  { name: "콩트 드 샹파뉴 블랑 드 블랑", producer: "테탱저", region: "cote-des-blancs", appellation: "Champagne", grape: "샤르도네", type: "sparkling", vintage: 2012, price: "30만원대" },
  { name: "피에르 페테르 퀴베 드 레제르브", producer: "피에르 페테르", region: "cote-des-blancs", appellation: "Champagne Grand Cru", grape: "샤르도네", type: "sparkling", vintage: "NV", price: "10만원대" },
  { name: "아그라파르 레 7 크뤼", producer: "아그라파르 (Agrapart)", region: "cote-des-blancs", appellation: "Champagne", grape: "샤르도네", type: "sparkling", vintage: "NV", price: "15만원대" },
  // 코트 드 세잔
  { name: "울리스 콜랭 레 마이용", producer: "울리스 콜랭", region: "cote-de-sezanne", appellation: "Champagne", grape: "샤르도네", type: "sparkling", vintage: "NV", price: "25만원대" },
  { name: "르 브룅 드 뇌빌 블랑 드 블랑", producer: "르 브룅 드 뇌빌", region: "cote-de-sezanne", appellation: "Champagne", grape: "샤르도네", type: "sparkling", vintage: "NV", price: "8만원대" },
  // 코트 데 바르
  { name: "세드릭 부샤르 로즈 드 잔", producer: "세드릭 부샤르", region: "cote-des-bar", appellation: "Champagne", grape: "피노 누아", type: "sparkling", vintage: 2019, price: "30만원대" },
  { name: "플뢰리 블랑 드 누아", producer: "플뢰리 (Fleury)", region: "cote-des-bar", appellation: "Champagne", grape: "피노 누아", type: "sparkling", vintage: "NV", price: "9만원대" },
  { name: "드라피에 카르트 도르", producer: "드라피에 (Drappier)", region: "cote-des-bar", appellation: "Champagne", grape: "피노 누아", type: "sparkling", vintage: "NV", price: "7만원대" }
];

const TYPE_LABEL = { red: "레드", white: "화이트", sparkling: "스파클링" };

let currentMap = "bourgogne";
let selectedRegion = null;

const panel = document.getElementById("panel");
const searchInput = document.getElementById("search");

/* ───────── Leaflet 지도 초기화 ───────── */
const map = L.map("map", { zoomControl: true })
  .setView(MAP_VIEWS.bourgogne.center, MAP_VIEWS.bourgogne.zoom);

/* 배경 타일: CARTO Voyager (무료, 출처 표기 필수) */
L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom: 19
}).addTo(map);

/* 지역별 임시 클릭 원 생성 (2-2에서 INAO 실제 경계 폴리곤으로 교체 예정) */
const regionCircles = {};
Object.entries(REGIONS).forEach(([id, r]) => {
  const circle = L.circle([r.lat, r.lng], {
    radius: r.radius,
    color: r.color, weight: 2,
    fillColor: r.color, fillOpacity: 0.35
  });
  circle.bindTooltip(r.name.split(" (")[0], {
    permanent: true, direction: "center", className: "region-tooltip"
  });
  circle.on("click", () => selectRegion(id));
  circle.on("mouseover", () => circle.setStyle({ fillOpacity: 0.55 }));
  circle.on("mouseout", () => circle.setStyle({
    fillOpacity: selectedRegion === id ? 0.55 : 0.35
  }));
  regionCircles[id] = circle;
});

function showCirclesFor(mapName) {
  Object.entries(REGIONS).forEach(([id, r]) => {
    if (r.map === mapName) regionCircles[id].addTo(map);
    else map.removeLayer(regionCircles[id]);
  });
}
showCirclesFor("bourgogne");

function highlightCircle(id) {
  Object.entries(regionCircles).forEach(([cid, c]) => {
    const sel = cid === id;
    c.setStyle({
      weight: sel ? 4 : 2,
      color: sel ? "#d9b96a" : REGIONS[cid].color,
      fillOpacity: sel ? 0.55 : 0.35
    });
  });
}

/* ───────── 오른쪽 패널 렌더링 ───────── */
function wineCard(w) {
  const regionName = REGIONS[w.region] ? REGIONS[w.region].name.split(" (")[0] : "";
  return `<div class="wine-card t-${w.type}">
    <div class="top"><span class="name"><span class="type-dot"></span>${w.name}</span><span class="vintage">${w.vintage}</span></div>
    <div class="producer">${w.producer}</div>
    <div class="meta">
      <span>${w.appellation}</span><span>${w.grape}</span>
      <span>${TYPE_LABEL[w.type]}</span><span>${w.price}</span><span>📍 ${regionName}</span>
    </div>
  </div>`;
}

function renderRegion(id) {
  const r = REGIONS[id];
  const wines = WINES.filter(w => w.region === id);
  panel.innerHTML = `
    <h2>${r.name}</h2>
    <p class="desc">${r.desc}</p>
    <div class="badge-row">
      ${r.grapes.map(g => `<span class="badge">🍇 ${g}</span>`).join("")}
      <span class="badge">🌡 ${r.climate}</span>
      <span class="badge">⭐ ${r.famous}</span>
    </div>
    <div class="count-note">이 지역 와인 ${wines.length}종</div>
    ${wines.map(wineCard).join("")}`;
}

function renderSearch(q) {
  const query = q.trim().toLowerCase();
  const results = WINES.filter(w => {
    const regionName = REGIONS[w.region] ? REGIONS[w.region].name : "";
    return [w.name, w.producer, w.appellation, w.grape, regionName, TYPE_LABEL[w.type]]
      .join(" ").toLowerCase().includes(query);
  });
  panel.innerHTML = `
    <h2>검색 결과</h2>
    <div class="count-note">"${q}" — ${results.length}종 (부르고뉴·샹파뉴 전체)</div>
    ${results.length ? results.map(wineCard).join("") : `<div class="empty">검색 결과가 없습니다.</div>`}`;
}

function renderHome() {
  const mapName = currentMap === "bourgogne" ? "부르고뉴" : "샹파뉴";
  const regionList = Object.entries(REGIONS).filter(([, r]) => r.map === currentMap);
  panel.innerHTML = `
    <h2>${mapName} 와인 지도</h2>
    <p class="desc">왼쪽 지도의 색깔 원을 클릭하면 해당 지역의 와인 목록이 표시됩니다. 지도는 드래그로 이동, 마우스 휠/버튼으로 확대·축소할 수 있습니다. 상단 검색창은 지역과 무관하게 전체 와인을 검색합니다.</p>
    <div class="count-note">지역 ${regionList.length}곳 · 등록 와인 ${WINES.length}종</div>
    ${regionList.map(([id, r]) => `
      <div class="wine-card" style="cursor:pointer" onclick="selectRegion('${id}')">
        <div class="top"><span class="name">${r.name}</span></div>
        <div class="meta"><span>🍇 ${r.grapes.join(", ")}</span><span>${WINES.filter(w => w.region === id).length}종</span></div>
      </div>`).join("")}`;
}

function selectRegion(id) {
  selectedRegion = id;
  searchInput.value = "";
  const r = REGIONS[id];
  if (r.map !== currentMap) switchMap(r.map, false);
  highlightCircle(id);
  map.flyTo([r.lat, r.lng], 11, { duration: 0.8 });
  renderRegion(id);
}
window.selectRegion = selectRegion;

function switchMap(mapName, resetPanel = true) {
  currentMap = mapName;
  if (resetPanel) { selectedRegion = null; searchInput.value = ""; }
  document.getElementById("tab-bourgogne").classList.toggle("active", mapName === "bourgogne");
  document.getElementById("tab-champagne").classList.toggle("active", mapName === "champagne");
  document.getElementById("map-title").textContent =
    (mapName === "bourgogne" ? "부르고뉴 (Bourgogne)" : "샹파뉴 (Champagne)") +
    " — 원을 클릭하면 그 지역 와인이 나옵니다 · 지도는 드래그/휠로 이동·확대";
  showCirclesFor(mapName);
  if (resetPanel) {
    highlightCircle(null);
    map.flyTo(MAP_VIEWS[mapName].center, MAP_VIEWS[mapName].zoom, { duration: 0.8 });
    renderHome();
  }
}
document.getElementById("tab-bourgogne").addEventListener("click", () => switchMap("bourgogne"));
document.getElementById("tab-champagne").addEventListener("click", () => switchMap("champagne"));

searchInput.addEventListener("input", e => {
  const q = e.target.value;
  if (!q.trim()) {
    selectedRegion ? renderRegion(selectedRegion) : renderHome();
    return;
  }
  highlightCircle(null);
  selectedRegion = null;
  renderSearch(q);
});

renderHome();
</script>
</body>
</html>
