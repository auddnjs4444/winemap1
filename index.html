<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vin Carte — 프랑스 와인 지도</title>
<meta name="description" content="부르고뉴와 샹파뉴의 실제 밭 경계 지도에서 와인을 찾아보세요.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #131016;
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }
  .photo {
    position: absolute; inset: 0;
    background-image: url("assets/vineyard.jpg");
    background-size: cover; background-position: center 38%;
  }
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, #13101699 0%, #13101640 45%, #131016cc 100%);
  }
  main { position: relative; z-index: 2; text-align: center; padding: 24px; }
  h1 {
    color: #f6f2f8; font-size: clamp(34px, 7vw, 60px); font-weight: 800;
    letter-spacing: 0.28em; text-indent: 0.28em; line-height: 1.2;
  }
  h1 span { color: #d1789f; }
  .line { width: 44px; height: 1px; background: #d9b96a; margin: 30px auto; }
  nav { display: flex; gap: 34px; justify-content: center; flex-wrap: wrap; }
  nav a {
    color: #d9b96a; text-decoration: none; font-size: 15px;
    letter-spacing: 0.2em; padding-bottom: 5px;
    border-bottom: 1px solid #d9b96a55;
    transition: border-color .15s, color .15s;
  }
  nav a:hover { border-color: #d9b96a; color: #f2dfae; }
  footer {
    position: absolute; bottom: 16px; left: 0; right: 0; z-index: 2;
    text-align: center; color: #ffffff66; font-size: 11px; letter-spacing: 0.08em;
  }
</style>
</head>
<body>
  <div class="photo"></div>
  <div class="overlay"></div>
  <main>
    <h1>VIN <span>CARTE</span></h1>
    <div class="line"></div>
    <nav>
      <a href="map.html">부르고뉴</a>
      <a href="map.html#champagne">샹파뉴</a>
      <a href="guide.html">가이드</a>
    </nav>
  </main>
  <footer>Romanée-Conti, Vosne-Romanée · 경계 데이터 INAO · 지도 © OpenStreetMap © CARTO</footer>
</body>
</html>
