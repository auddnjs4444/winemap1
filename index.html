<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vin Carte — 프랑스 와인 지도</title>
<!-- Leaflet 지도 엔진 (오픈소스, 무료) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #16121a;
    --panel: #211b28;
    --panel2: #2a2233;
    --line: #3a3145;
    --text: #efe9f2;
    --muted: #a89bb5;
    --wine: #b0356b;
    --wine-soft: #d1789f;
    --gold: #d9b96a;
    --red: #c96a6a;
    --white-w: #e3d48a;
    --sparkling: #9fc7d9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  header h1 span { color: var(--wine-soft); }
  .search-wrap { flex: 1; min-width: 260px; max-width: 520px; position: relative; }
  .search-wrap input {
    width: 100%; padding: 10px 14px 10px 38px;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
    color: var(--text); font-size: 14px; outline: none;
  }
  .search-wrap input:focus { border-color: var(--wine-soft); }
  .search-wrap::before {
    content: "🔍"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 13px; opacity: 0.7;
  }
  .tabs { display: flex; gap: 8px; }
  .tabs button {
    padding: 9px 18px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--panel); color: var(--muted); font-size: 14px; cursor: pointer;
    font-weight: 600;
  }
  .tabs button.active { background: var(--wine); border-color: var(--wine); color: #fff; }

  main { display: grid; grid-template-columns: minmax(340px, 1fr) minmax(320px, 480px); }
  @media (max-width: 860px) { main { grid-template-columns: 1fr; } }

  .map-area { display: flex; flex-direction: column; }
  .map-title { font-size: 14px; color: var(--muted); padding: 10px 16px; }
  #map {
    flex: 1; min-height: 520px; height: calc(100vh - 130px);
    border-top: 1px solid var(--line);
  }
  @media (max-width: 860px) { #map { height: 60vh; min-height: 380px; } }

  /* Leaflet 요소를 다크 테마에 맞게 손질 */
  .leaflet-container { background: #1d2530; font: inherit; }
  .leaflet-container path.leaflet-interactive:focus { outline: none; }
  .region-tooltip {
    background: rgba(22, 18, 26, 0.92); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    font-weight: 700; font-size: 12px; padding: 4px 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .region-tooltip::before { display: none; }

  .side {
    border-left: 1px solid var(--line); background: var(--panel);
    padding: 20px; min-height: calc(100vh - 70px); overflow-y: auto;
  }
  @media (max-width: 860px) { .side { border-left: none; border-top: 1px solid var(--line); min-height: auto; } }
  .side h2 { font-size: 18px; margin-bottom: 4px; }
  .side .desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
  .badge-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .badge {
    font-size: 11px; padding: 3px 10px; border-radius: 999px;
    background: var(--panel2); border: 1px solid var(--line); color: var(--muted);
  }
  .count-note { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

  .wine-card {
    background: var(--panel2); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px; cursor: default;
    transition: border-color .15s;
  }
  .wine-card:hover { border-color: var(--wine-soft); }
  .wine-card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .wine-card .name { font-size: 14px; font-weight: 700; }
  .wine-card .vintage { font-size: 12px; color: var(--gold); white-space: nowrap; }
  .wine-card .producer { font-size: 12px; color: var(--wine-soft); margin-top: 2px; }
  .wine-card .meta { font-size: 12px; color: var(--muted); margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
  .type-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .t-red .type-dot { background: var(--red); }
  .t-white .type-dot { background: var(--white-w); }
  .t-sparkling .type-dot { background: var(--sparkling); }
  .t-rose .type-dot { background: #e8a0b4; }
  .wine-card .wdesc { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }
  .empty { color: var(--muted); font-size: 13px; padding: 24px 0; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>Vin <span>Carte</span></h1>
  <div class="tabs">
    <button id="tab-bourgogne" class="active">부르고뉴</button>
    <button id="tab-champagne">샹파뉴</button>
  </div>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="와인, 생산자, 품종, 아펠라시옹 검색… (전체 와인 대상)">
  </div>
</header>

<main>
  <div class="map-area">
    <div class="map-title" id="map-title">부르고뉴 (Bourgogne) — 색칠된 산지를 클릭하면 와인이 나옵니다 · 확대하면 밭 모양이 자세히 보여요</div>
    <div id="map"></div>
  </div>

  <aside class="side">
    <div id="panel"></div>
  </aside>
</main>

<script>
/* ─────────────────────────────────────────────
   지역 정보 (lat/lng: 실제 좌표, radius: 임시 클릭 원의 반경 m)
   2-2 단계에서 이 원들을 INAO 실제 경계 폴리곤으로 교체할 예정
────────────────────────────────────────────── */
const REGIONS = {
  "chablis": {
    map: "bourgogne", name: "샤블리 (Chablis)", lat: 47.813, lng: 3.798, radius: 6000, color: "#9db54a",
    desc: "부르고뉴 최북단, 키메리지안 석회질 토양에서 나오는 미네랄리티 강한 샤르도네 화이트의 성지.",
    grapes: ["샤르도네"], climate: "서늘한 대륙성", famous: "그랑 크뤼 7개 클리마"
  },
  "cote-de-nuits": {
    map: "bourgogne", name: "코트 드 뉘 (Côte de Nuits)", lat: 47.177, lng: 4.955, radius: 5500, color: "#c04a6e",
    desc: "세계 최고의 피노 누아 산지. 주브레-샹베르탱, 본 로마네 등 전설적인 그랑 크뤼 마을이 이어진다.",
    grapes: ["피노 누아"], climate: "대륙성", famous: "로마네 콩티, 샹베르탱"
  },
  "cote-de-beaune": {
    map: "bourgogne", name: "코트 드 본 (Côte de Beaune)", lat: 46.988, lng: 4.795, radius: 6000, color: "#d1789f",
    desc: "몽라셰·뫼르소 등 세계 최정상 화이트와 볼네·포마르의 우아한 레드가 공존하는 지역.",
    grapes: ["샤르도네", "피노 누아"], climate: "대륙성", famous: "몽라셰, 코르통-샤를마뉴"
  },
  "cote-chalonnaise": {
    map: "bourgogne", name: "코트 샬로네즈 (Côte Chalonnaise)", lat: 46.840, lng: 4.720, radius: 6000, color: "#c99b4a",
    desc: "메르퀴레, 지브리, 륄리 등 가성비 좋은 피노 누아와 샤르도네, 그리고 알리고테의 부즈롱.",
    grapes: ["피노 누아", "샤르도네", "알리고테"], climate: "대륙성", famous: "메르퀴레, 몽타니"
  },
  "maconnais": {
    map: "bourgogne", name: "마코네 (Mâconnais)", lat: 46.320, lng: 4.740, radius: 7000, color: "#6f9e5a",
    desc: "부르고뉴 남부의 온화한 지역. 푸이-퓌세를 필두로 풍만한 스타일의 샤르도네가 주력.",
    grapes: ["샤르도네", "가메"], climate: "온화한 대륙성", famous: "푸이-퓌세, 생-베랑"
  },
  "montagne-de-reims": {
    map: "champagne", name: "몽타뉴 드 랭스 (Montagne de Reims)", lat: 49.155, lng: 4.100, radius: 7000, color: "#c04a6e",
    desc: "피노 누아 중심의 그랑 크뤼 마을(부지, 베르즈네, 앙보네)이 모여 있는 샹파뉴의 심장.",
    grapes: ["피노 누아", "샤르도네"], climate: "서늘한 해양성", famous: "부지, 베르즈네 그랑 크뤼"
  },
  "vallee-de-la-marne": {
    map: "champagne", name: "발레 드 라 마른 (Vallée de la Marne)", lat: 49.055, lng: 3.900, radius: 7500, color: "#6f9e5a",
    desc: "마른 강을 따라 펼쳐진 계곡. 과일 향이 풍부한 피노 뫼니에의 본거지.",
    grapes: ["피노 뫼니에", "피노 누아"], climate: "서늘한 해양성", famous: "아이(Aÿ), 오빌레르"
  },
  "cote-des-blancs": {
    map: "champagne", name: "코트 데 블랑 (Côte des Blancs)", lat: 48.965, lng: 4.020, radius: 5500, color: "#d4c25a",
    desc: "이름 그대로 '화이트의 언덕'. 샤르도네 100% 블랑 드 블랑의 최고 산지 (르 메닐, 아비즈).",
    grapes: ["샤르도네"], climate: "서늘한 해양성", famous: "르 메닐-쉬르-오제, 크라망"
  },
  "cote-de-sezanne": {
    map: "champagne", name: "코트 드 세잔 (Côte de Sézanne)", lat: 48.720, lng: 3.720, radius: 6000, color: "#9db54a",
    desc: "코트 데 블랑 남쪽의 연장선. 부드럽고 과일 향이 풍부한 샤르도네 스타일.",
    grapes: ["샤르도네"], climate: "온화한 해양성", famous: "세잔"
  },
  "cote-des-bar": {
    map: "champagne", name: "코트 데 바르 (Côte des Bar / Aube)", lat: 48.055, lng: 4.400, radius: 9000, color: "#c99b4a",
    desc: "샹파뉴 남부 오브 지역. 키메리지안 토양의 피노 누아와 개성 있는 소규모 생산자(그로워)들의 무대.",
    grapes: ["피노 누아"], climate: "대륙성 영향", famous: "레 리세, 로제 데 리세"
  }
};

/* 지도 초기 화면 범위 */
const MAP_VIEWS = {
  bourgogne: { center: [47.05, 4.45], zoom: 9 },
  champagne: { center: [48.85, 4.05], zoom: 9 }
};

let WINES = [];  // data/wines.json 에서 로드 (3단계)

const TYPE_LABEL = { red: "레드", white: "화이트", sparkling: "스파클링", rose: "로제" };

let currentMap = "bourgogne";
let selectedRegion = null;

const panel = document.getElementById("panel");
const searchInput = document.getElementById("search");

/* ───────── Leaflet 지도 초기화 ───────── */
const map = L.map("map", { zoomControl: true })
  .setView(MAP_VIEWS.bourgogne.center, MAP_VIEWS.bourgogne.zoom);

/* 배경 타일: CARTO Voyager (무료, 출처 표기 필수) */
L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom: 19
}).addTo(map);

/* INAO 실제 경계 GeoJSON (2-2단계)
   - bourgogne.geojson: 아펠라시옹별 실제 밭 경계 (INAO 파셀레르, 아펠라시옹 단위로 병합)
   - champagne.geojson: AOC Champagne 지리적 영역을 5개 소지역으로 분할 */
const geoLayers = { bourgogne: null, champagne: null };
const featureLayers = [];   // { layer, sub } — 하이라이트용

/* 지역 색을 어둡게 만든 버전 (호버 테두리용) */
function darken(hex, factor) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.round(((n >> 16) & 255) * factor);
  const g = Math.round(((n >> 8) & 255) * factor);
  const b = Math.round((n & 255) * factor);
  return "#" + ((r << 16) | (g << 8) | b).toString(16).padStart(6, "0");
}

function styleFor(sub, selected) {
  const r = REGIONS[sub];
  return {
    color: selected ? "#d9b96a" : r.color,
    weight: selected ? 2.5 : 1.2,
    fillColor: r.color,
    fillOpacity: selected ? 0.55 : 0.35
  };
}

function makeGeoLayer(fc) {
  return L.geoJSON(fc, {
    style: f => styleFor(f.properties.subregion, false),
    onEachFeature: (f, layer) => {
      const sub = f.properties.subregion;
      const app = f.properties.app;
      const label = app === "Champagne" ? REGIONS[sub].name.split(" (")[0] : app;
      layer.bindTooltip(label, { sticky: true, className: "region-tooltip" });
      // 지도 위에서 클릭할 땐 화면을 움직이지 않음 (fly=false)
      layer.on("click", () => selectRegion(sub, false));
      layer.on("mouseover", () => {
        layer.setStyle({ color: darken(REGIONS[sub].color, 0.55), weight: 2.5, fillOpacity: 0.6 });
        layer.bringToFront();
      });
      layer.on("mouseout", () => layer.setStyle(styleFor(sub, selectedRegion === sub)));
      featureLayers.push({ layer, sub });
    }
  });
}

Promise.all([
  fetch("data/bourgogne.geojson").then(r => r.json()),
  fetch("data/champagne.geojson").then(r => r.json()),
  fetch("data/wines.json").then(r => r.json())
]).then(([b, c, wines]) => {
  geoLayers.bourgogne = makeGeoLayer(b);
  geoLayers.champagne = makeGeoLayer(c);
  WINES = wines;
  showLayerFor(currentMap);
  renderHome();
}).catch(() => {
  document.getElementById("map-title").textContent =
    "경계 데이터를 불러오지 못했습니다 — 새로고침해 주세요";
});

function showLayerFor(mapName) {
  ["bourgogne", "champagne"].forEach(m => {
    const gl = geoLayers[m];
    if (!gl) return;
    if (m === mapName) gl.addTo(map);
    else map.removeLayer(gl);
  });
}

function highlightRegion(id) {
  featureLayers.forEach(({ layer, sub }) => layer.setStyle(styleFor(sub, sub === id)));
}

/* ───────── 오른쪽 패널 렌더링 ───────── */
function wineCard(w) {
  const regionName = REGIONS[w.region] ? REGIONS[w.region].name.split(" (")[0] : "";
  const producer = w.producerOrig ? `${w.producerKo} (${w.producerOrig})` : w.producerKo;
  return `<div class="wine-card t-${w.type}">
    <div class="top"><span class="name"><span class="type-dot"></span>${w.nameKo}</span><span class="vintage">${w.vintage}</span></div>
    <div class="producer">${producer}</div>
    <div class="meta">
      <span>${w.appellation}</span><span>${w.grape}</span>
      <span>${TYPE_LABEL[w.type] || w.type}</span><span>${w.price}</span><span>📍 ${regionName}</span>
    </div>
    ${w.desc ? `<div class="wdesc">${w.desc}</div>` : ""}
  </div>`;
}

function renderRegion(id) {
  const r = REGIONS[id];
  const wines = WINES.filter(w => w.region === id);
  panel.innerHTML = `
    <h2>${r.name}</h2>
    <p class="desc">${r.desc}</p>
    <div class="badge-row">
      ${r.grapes.map(g => `<span class="badge">🍇 ${g}</span>`).join("")}
      <span class="badge">🌡 ${r.climate}</span>
      <span class="badge">⭐ ${r.famous}</span>
    </div>
    <div class="count-note">이 지역 와인 ${wines.length}종</div>
    ${wines.map(wineCard).join("")}`;
}

function renderSearch(q) {
  const query = q.trim().toLowerCase();
  const results = WINES.filter(w => {
    const regionName = REGIONS[w.region] ? REGIONS[w.region].name : "";
    return [w.nameKo, w.nameOrig, w.producerKo, w.producerOrig,
            w.appellation, w.grape, w.desc, regionName, TYPE_LABEL[w.type]]
      .join(" ").toLowerCase().includes(query);
  });
  panel.innerHTML = `
    <h2>검색 결과</h2>
    <div class="count-note">"${q}" — ${results.length}종 (부르고뉴·샹파뉴 전체)</div>
    ${results.length ? results.map(wineCard).join("") : `<div class="empty">검색 결과가 없습니다.</div>`}`;
}

function renderHome() {
  const mapName = currentMap === "bourgogne" ? "부르고뉴" : "샹파뉴";
  const regionList = Object.entries(REGIONS).filter(([, r]) => r.map === currentMap);
  panel.innerHTML = `
    <h2>${mapName} 와인 지도</h2>
    <p class="desc">왼쪽 지도의 색칠된 산지를 클릭하면 해당 지역의 와인 목록이 표시됩니다. 경계선은 프랑스 INAO 공식 데이터 기반의 실제 아펠라시옹 경계입니다. 확대하면 밭 모양까지 보여요. 상단 검색창은 지역과 무관하게 전체 와인을 검색합니다.</p>
    <div class="count-note">지역 ${regionList.length}곳 · 등록 와인 ${WINES.length}종</div>
    ${regionList.map(([id, r]) => `
      <div class="wine-card" style="cursor:pointer" onclick="selectRegion('${id}')">
        <div class="top"><span class="name">${r.name}</span></div>
        <div class="meta"><span>🍇 ${r.grapes.join(", ")}</span><span>${WINES.filter(w => w.region === id).length}종</span></div>
      </div>`).join("")}`;
}

function selectRegion(id, fly = true) {
  selectedRegion = id;
  searchInput.value = "";
  const r = REGIONS[id];
  if (r.map !== currentMap) switchMap(r.map, false);
  highlightRegion(id);
  if (fly) map.flyTo([r.lat, r.lng], 11, { duration: 0.8 });
  renderRegion(id);
}
window.selectRegion = selectRegion;

function switchMap(mapName, resetPanel = true) {
  currentMap = mapName;
  if (resetPanel) { selectedRegion = null; searchInput.value = ""; }
  document.getElementById("tab-bourgogne").classList.toggle("active", mapName === "bourgogne");
  document.getElementById("tab-champagne").classList.toggle("active", mapName === "champagne");
  document.getElementById("map-title").textContent =
    (mapName === "bourgogne" ? "부르고뉴 (Bourgogne)" : "샹파뉴 (Champagne)") +
    " — 색칠된 산지를 클릭하면 와인이 나옵니다 · 확대하면 밭 모양이 자세히 보여요";
  showLayerFor(mapName);
  if (resetPanel) {
    highlightRegion(null);
    map.flyTo(MAP_VIEWS[mapName].center, MAP_VIEWS[mapName].zoom, { duration: 0.8 });
    renderHome();
  }
}
document.getElementById("tab-bourgogne").addEventListener("click", () => switchMap("bourgogne"));
document.getElementById("tab-champagne").addEventListener("click", () => switchMap("champagne"));

searchInput.addEventListener("input", e => {
  const q = e.target.value;
  if (!q.trim()) {
    selectedRegion ? renderRegion(selectedRegion) : renderHome();
    return;
  }
  highlightRegion(null);
  selectedRegion = null;
  renderSearch(q);
});

renderHome();
</script>
</body>
</html>
